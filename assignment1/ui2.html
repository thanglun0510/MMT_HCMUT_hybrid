<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>P2P Chat - Peer B</title>
    <style>
        body { font-family: Arial; padding: 20px; max-width: 400px; margin: auto; background-color: #f4f8ff; }
        .box { border: 1px solid #b3d4fc; background: white; padding: 15px; border-radius: 8px; margin-bottom: 10px; }
        input, button { padding: 8px; margin-top: 5px; width: 100%; box-sizing: border-box; }
        button { background-color: #28a745; color: white; border: none; cursor: pointer; font-weight: bold; }
        button:hover { background-color: #218838; }
        h3 { color: #0056b3; margin-top: 0; }
    </style>
</head>
<body>

    <div class="box">
        <h3>Điều khiển Peer B (Cổng 2002)</h3>
        <button onclick="connectAll()">1. Kết nối mạng lưới (Connect All)</button>
        <p id="status" style="color: green; font-size: 14px; font-weight: bold;"></p>
    </div>

    <div class="box">
        <h3>Trả lời tin nhắn (Broadcast)</h3>
        <input type="text" id="msgInput" placeholder="Nhập câu trả lời cho Peer A...">
        <button onclick="sendMessage()">2. Gửi tin nhắn</button>
    </div>

    <script>
        // CHÚ Ý: Cổng ở đây đã đổi thành 2002 để trỏ vào Backend của Peer B
        const PEER_B_API = 'http://127.0.0.1:2002';

        function connectAll() {
            document.getElementById('status').innerText = "Đang tìm bạn bè...";
            fetch(`${PEER_B_API}/connect-all`)
                .then(response => response.json())
                .then(data => {
                    document.getElementById('status').innerText = "Đã kết nối với: " + data.new_peers + " peer(s)";
                })
                .catch(err => alert("Lỗi: Backend cổng 2002 của Peer B chưa chạy hoặc bị chặn CORS!"));
        }

        function sendMessage() {
            let text = document.getElementById('msgInput').value;
            if (!text) return alert("Chưa nhập tin nhắn!");

            fetch(`${PEER_B_API}/broadcast-peer`, {
                method: 'POST',
                body: JSON.stringify({ message: text })
            })
            .then(res => res.json())
            .then(data => {
                alert("Peer B đã gửi tin nhắn thành công!");
                document.getElementById('msgInput').value = ''; 
            });
        }
    </script>
</body>
</html>
